<mat-drawer-container class="admin-container">
  <mat-drawer #drawer class="admin-sidebar" mode="side" opened>
    <div class="sidebar-header">
      <h4>E-Commerce</h4>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/admin/dashboard">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>

      <a mat-list-item routerLink="/admin/users">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Users</span>
      </a>

      <a mat-list-item routerLink="/admin/products">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Products</span>
      </a>

      <a mat-list-item routerLink="/admin/orders">
        <mat-icon matListItemIcon>shopping_bag</mat-icon>
        <span matListItemTitle>Orders</span>
      </a>
    </mat-nav-list>
  </mat-drawer>

  <mat-drawer-content>
    <header class="admin-header">
      <div>
        <button class="btn" (click)="drawer.toggle()">
          <mat-icon>
            {{ drawer.opened ? 'first_page' : 'last_page' }}
          </mat-icon>
        </button>

        <span class="section-heading"> Admin Panel </span>
      </div>

      <button class="btn btn-outline-danger logout-btn" (click)="logOut()">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </header>

    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </mat-drawer-content>
</mat-drawer-container>
