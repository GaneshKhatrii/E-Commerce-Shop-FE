<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="primary-heading">Users</h1>
  </div>

  <div class="card">
    <app-table
      [columns]="columns"
      [data]="usersList()"
      [totalRecords]="totalRecords()"
      [pageNumber]="pageNumber()"
      [pageSize]="pageSize()"
      (pageChange)="onPageChange($event)"
    ></app-table>
  </div>
</div>
