<div class="container-fluid">
  <h1 class="primary-heading mb-4">Orders</h1>

  <div class="card">
    <app-table
      [pageNumber]="pageNumber()"
      [pageSize]="pageSize()"
      [totalRecords]="totalRecords()"
      [data]="ordersList()"
      [columns]="columns"
      (pageChange)="onPageChange($event)"
      (rowChange)="onRowChange($event)"
    ></app-table>
  </div>
</div>
