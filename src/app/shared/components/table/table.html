<table class="table table-hover align-middle mb-0">
  <thead>
    <tr>
      @for (col of columns; track $index) {
        <th>{{ col.label }}</th>
      }
    </tr>
  </thead>

  <tbody>
    @for (row of data; track row.id) {
      <tr>
        @for (col of columns; track $index) {
          <td>{{ row[col.key] }}</td>
        }
      </tr>
    }
  </tbody>
</table>

<!-- Material paginator starts index from 0, but our API's pageNumber starts from 1, so just do 'pageNumber - 1' -->
<mat-paginator
  [length]="totalRecords"
  [pageIndex]="pageNumber - 1"
  [pageSize]="pageSize"
  [pageSizeOptions]="[10, 20, 50, 100, 200]"
  (page)="onPageChange($event)"
></mat-paginator>
